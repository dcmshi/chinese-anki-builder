# Default configuration for Anki Chinese Deck Builder

# Word selection
top_words: 150
min_frequency: 2

# HSK filtering (optional)
# Uncomment to only include words from these HSK 3.0 levels (7 = 7-9 band).
# Word lists download on first use and are cached under data/hsk/.
# hsk_levels: [1, 2, 3, 4, 5]

# TTS audio generation
enable_tts: false

# Card style: false = word-in-sentence cards, true = cloze-deletion cards
cloze: false

# Output
output_dir: "output"
stats_file: null  # Set to a path to export stats (e.g., "stats.json")

# Processing
# Minimum sentence length for context
min_sentence_length: 10
max_sentence_length: 100
