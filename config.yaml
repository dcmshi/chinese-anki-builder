# Default configuration for Anki Chinese Deck Builder

# Word selection
top_words: 150
min_frequency: 2

# HSK filtering (optional)
# Uncomment to only include words from these HSK 3.0 levels (7 = 7-9 band).
# Word lists download on first use and are cached under data/hsk/.
# hsk_levels: [1, 2, 3, 4, 5]

# TTS audio generation
enable_tts: false

# Card style: false = word-in-sentence cards, true = cloze-deletion cards
cloze: false

# Output
output_dir: "output"
stats_file: null  # Set to a path to export stats (e.g., "stats.json")

# Processing
# Minimum sentence length for context
min_sentence_length: 10
max_sentence_length: 100

# Translation
# Backends ranked by quality: HY-MT1.5 (95, opt-in: uv sync --extra hymt)
# > NLLB-200 (90, opt-in: uv sync --extra nllb) > Argos (80, default)
# > CC-CEDICT word-by-word (40, always available).
# preferred_backend: hymt      # force one of: hymt, nllb, argos, cedict
# prefer_offline: true         # skip backends that need the network
# translation_cache: true      # persist translations under data/cache/
#
# Model overrides (all optional; env vars also work, see TRANSLATION.md):
# hymt_model_repo: tencent/HY-MT1.5-7B-GGUF   # default: 1.8B build
# hymt_model_file: "*Q4_K_M.gguf"             # glob against the repo files
# hymt_revision: <commit>                     # pin for reproducible downloads
# nllb_model_repo: entai2965/nllb-200-distilled-600M-ctranslate2
# nllb_model_revision: <commit>
# nllb_tokenizer_revision: <commit>
